baseURL                = "https://my-blog-p39q.vercel.app/"
languageCode           = "zh"
title                  = "huluhuluu"
# Theme i18n support
# See i18n folder for available languages
defaultContentLanguage = "zh"
# Set hasCJKLanguage to true if DefaultContentLanguage is a CJK language
# This will make .Summary and .WordCount behave correctly
hasCJKLanguage         = true
theme                  = "hugo-theme-stack"

[pagination]
    pagerSize = 10

[permalinks]
    post = "/p/:slug/"
    page = "/:slug/"

[sitemap]
    changefreq = "weekly"
    filename   = "sitemap.xml"
    priority   = 0.5

# Mount submodule blog content as separate posts
# Use excludeFiles to prevent duplicate processing
[module]
    [[module.mounts]]
        source = "content"
        target = "content"
        excludeFiles = [
            "post/mnn-tutorial/blog/**", 
            "post/useful-tools/blog/**", 
            "post/leetcode-logs/blog/**",
            "post/brain-candy/blog/**",
            "post/opencl-tutorial/blog/**",
            "post/qnn-tutorial/blog/**",
            "post/transformers-code-view/blog/**"
        ]
    [[module.mounts]]
        source = "content/post/mnn-tutorial/blog"
        target = "content/post"
    [[module.mounts]]
        source = "content/post/useful-tools/blog"
        target = "content/post"
    [[module.mounts]]
        source = "content/post/leetcode-logs/blog"
        target = "content/post"
    [[module.mounts]]
        source = "content/post/brain-candy/blog"
        target = "content/post"
    [[module.mounts]]
        source = "content/post/opencl-tutorial/blog"
        target = "content/post"
    [[module.mounts]]
        source = "content/post/qnn-tutorial/blog"
        target = "content/post"
    [[module.mounts]]
        source = "content/post/transformers-code-view/blog"
        target = "content/post"
